<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Movie App - Watchlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/watchlist.css">
</head>
<body>

<nav id="navbar">
    <div class="nav-brand">
        <h1>Movie App</h1>
    </div>
    <div class="nav-links-group">
        <a href="index.html" class="nav-link">Home</a>
        <a href="movies.html" class="nav-link">Movies</a>
        <a href="coming.html" class="nav-link">Coming Soon</a>
        <a href="watchlist.html" class="nav-link active">Watchlist <span id="navWlCount">0</span></a>
        <button id="themeToggle" class="theme-toggle">Light</button>
    </div>
</nav>

<main id="appRoot">
    <!-- WATCHLIST PAGE -->
    <div id="watchlistPage" class="page">
        <h2>My Watchlist</h2>
        <div id="errorBox" class="error-message hidden"></div>
        <div id="wlEmptyState" class="wl-empty">
            <p>Your watchlist is empty. Add some movies!</p>
        </div>
        <div id="wlGrid" class="movies-grid"></div>
        <div id="wlActions" class="hidden" style="text-align:center; margin-top:2rem;">
            <p>Total: <strong id="wlCount">0</strong></p>
            <button id="randomBtn">Random Pick</button>
            <button id="clearAllBtn">Clear All</button>
        </div>
    </div>
</main>

<div id="toast" class="toast hidden"></div>

<script src="js/common.js"></script>
<script src="js/watchlist.js"></script>
</body>
</html>
