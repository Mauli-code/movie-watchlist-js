<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watchlist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="navbar">
    <h1>Watch</h1>
    <div class="nav-left">
        <a class="nav-link active">Home</a>
        <a class="nav-link">Movies</a>
        <a class="nav-link" id="wlNavBtn">Watchlist <span id="navWlCount">0</span></a>
    </div>
</nav>

<main class="content">
    <div class="search-section">
        <input type="text" id="searchInput" placeholder="Search movies...">
        <button id="searchBtn">Search</button>
        <button id="clearBtn" class="hidden">✕ Clear</button>
    </div>

    <div id="errorBox" class="error-message hidden">
        <span id="errorText"></span>
    </div>

    <div id="loader" class="loading-spinner hidden">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <div id="landingWrap" class="landing-section">
        <h2 id="popularTitle">Popular Movies</h2>
    </div>

    <div id="resultsBar" class="results-bar hidden">
        <div class="results-header">
            <h2 id="resultsCount"></h2>
            <select id="sortSelect">
                <option value="default">Default</option>
                <option value="year-desc">Year (Newest)</option>
                <option value="year-asc">Year (Oldest)</option>
                <option value="az">A-Z</option>
                <option value="za">Z-A</option>
            </select>
        </div>
    </div>

    <div id="noResults" class="no-results hidden">
        <p>No movies found. Try a different search.</p>
    </div>

    <div id="moviesGrid" class="movies-grid"></div>
</main>

<!-- Watchlist Sidebar -->
<div id="wlSidebar" class="wl-sidebar">
    <div class="wl-header">
        <h2>My Watchlist</h2>
        <button class="wl-close" id="wlCloseBtn">✕</button>
    </div>
    <div id="wlEmptyState" class="wl-empty">
        <p>No movies in your watchlist yet</p>
    </div>
    <ul id="wlList" class="wl-list"></ul>
    <div id="wlActions" class="wl-actions hidden">
        <p class="wl-count">Total: <strong id="wlCount">0</strong></p>
        <button id="randomBtn" class="btn-random">Pick Random</button>
        <button id="clearAllBtn" class="btn-clear-all">Clear All</button>
    </div>
</div>

<div id="mobBackdrop" class="mob-backdrop hidden"></div>

<!-- Detail Modal -->
<div id="detailOverlay" class="detail-modal hidden">
    <div class="detail-content">
        <div id="detailSkeleton" class="detail-skeleton">
            <div class="skeleton-poster"></div>
            <div class="skeleton-text"></div>
        </div>
        <div id="detailBody" class="detail-body hidden">
            <img id="dPoster" class="detail-poster" src="" alt="">
            <div class="detail-info">
                <h2 id="dTitle"></h2>
                <div id="dChips" class="chips"></div>
                <div id="dScoreRow" class="scores"></div>
                <div id="dGenres" class="genres"></div>
                <p id="dPlot" class="plot"></p>
                <div id="dCrew" class="crew"></div>
                <button id="detailWlBtn" class="detail-wl-btn">Add to Watchlist</button>
            </div>
        </div>
        <button id="detailCloseBtn" class="modal-close">✕</button>
    </div>
</div>

<!-- Random Picker Modal -->
<div id="randomOverlay" class="random-modal hidden">
    <div class="random-content">
        <div class="random-body">
            <img id="rPoster" src="" alt="" class="random-poster">
            <div class="random-info">
                <h2 id="rTitle"></h2>
                <p id="rYear"></p>
            </div>
        </div>
        <div class="random-actions">
            <button id="randomAgainBtn" class="btn-again">Pick Again</button>
            <button id="randomCloseBtn" class="btn-close-random">Close</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">Added</div>

<script src="script.js"></script>

</body>
</html>
