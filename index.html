<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie App - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/movies.css">
</head>
<body>

<nav id="navbar">
    <div class="nav-brand">
        <h1>Movie App</h1>
    </div>
    <div class="nav-links-group">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="movies.html" class="nav-link">Movies</a>
        <a href="library.html" class="nav-link">Library <span id="navWlCount">0</span></a>
        <button id="themeToggle" class="theme-toggle">Dark</button>
    </div>
</nav>

<main id="appRoot">
    <div id="homePage" class="page">
        <div class="search-card">
            <div class="search-flex">
                <input type="text" id="searchInput" placeholder="Search movies...">
                <button id="searchBtn" class="btn-primary">Search</button>
                <button id="surpriseBtn" class="btn-primary" type="button">Surprise Me</button>
                <button id="clearBtn" class="hidden">Clear</button>
            </div>
            <div id="surpriseResult" class="surprise-result hidden"></div>
        </div>

        <div id="errorBox" class="error-message hidden"></div>

        <div id="landingWrap">
            <h2>Popular Movies</h2>
        </div>

        <div id="resultsBar" class="hidden">
            <div class="results-header">
                <h3 id="resultsCount"></h3>
                <div class="controls-row">
                    <select id="filterSelect">
                        <option value="all">All years</option>
                        <option value="pre1990">Before 1990</option>
                        <option value="1990-2009">1990-2009</option>
                        <option value="2010-plus">2010+</option>
                    </select>
                    <select id="sortSelect">
                        <option value="default">Default</option>
                        <option value="year-desc">Newest first</option>
                        <option value="year-asc">Oldest first</option>
                        <option value="az">A-Z</option>
                        <option value="za">Z-A</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="noResults" class="hidden">No results</div>
        <div id="moviesGrid" class="movies-grid"></div>
        <div id="loader" class="loader hidden">Loading...</div>
    </div>
</main>

<div id="detailOverlay" class="detail-modal hidden">
    <div id="detailSkeleton" class="loading-spinner"></div>
    <div id="detailBody" class="detail-content hidden"></div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="js/common.js"></script>
<script src="js/movie-card.js"></script>
<script src="js/home.js"></script>
</body>
</html>
